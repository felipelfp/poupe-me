<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POUPE-ME | Em Construção</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="pro-minimal-container">
        <div class="brand-center">
            <img src="logo.png" alt="Poupe-me Logo">
        </div>

        <h1 class="minimal-title">Em Construção</h1>
        <p class="minimal-slogan">Não importa o tamanho do seu negócio, para o <strong>Poupe-me</strong> você é elite.
        </p>

        <div class="tech-indicator">
            <div class="pulse-dot"></div>
            <span class="pulse-text">Desenvolvendo a Próxima Geração das suas Finanças</span>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="register-modal" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Bem-vindo o Poupe-me</h2>
                <p>Identificamos que você faz parte da nossa Elite. Cadastre-se abaixo.</p>
            </div>
            <form id="register-form">
                <div class="modal-input-group">
                    <label for="reg-name">Nome Completo</label>
                    <input type="text" id="reg-name" placeholder="Como deseja ser chamado?" required>
                </div>
                <div class="modal-input-group">
                    <label for="reg-phone">Telefone / WhatsApp</label>
                    <input type="tel" id="reg-phone" placeholder="(11) 99999-9999" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Começar Agora</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
